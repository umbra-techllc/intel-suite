<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NBA Parlay Finder v2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0c10;
  --bg1: #0f1218;
  --bg2: #151a24;
  --border: #252d3d;
  --text: #e2e6ef;
  --text2: #8a96b0;
  --text3: #4d5a75;
  --green: #00f593;
  --green-bg: rgba(0,245,147,0.08);
  --red: #ff4d6a;
  --gold: #ffc233;
  --mono: 'Space Mono', monospace;
  --sans: 'Outfit', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.logo { font-family: var(--mono); font-size: 14px; letter-spacing: 3px; color: var(--green); }
.controls { display: flex; gap: 10px; flex-wrap: wrap; }

.btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--text2); color: var(--text); }
.btn-primary { background: var(--green); border-color: var(--green); color: var(--bg); }
.btn-primary:hover { opacity: 0.9; }

.input {
  background: var(--bg1);
  border: 1px solid var(--border);
  color: var(--green);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 12px;
  border-radius: 5px;
  width: 280px;
}
.input::placeholder { color: var(--text3); }

.toggle-group { display: flex; background: var(--bg1); border-radius: 5px; padding: 3px; }
.toggle-btn {
  background: transparent;
  border: none;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 10px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
}
.toggle-btn.active { background: var(--bg2); color: var(--green); }

.stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.stat-label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1px; margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 600; }
.stat-value.green { color: var(--green); }

.game-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.game-header { background: var(--bg2); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.game-title { font-weight: 500; }
.game-time { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.pace-badge { font-family: var(--mono); font-size: 9px; padding: 4px 8px; border-radius: 4px; margin-left: 10px; }
.pace-fast { background: var(--green-bg); color: var(--green); }

.team-section { padding: 16px; border-bottom: 1px solid var(--border); }
.team-section:last-child { border-bottom: none; }
.team-name { font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.home-badge { font-family: var(--mono); font-size: 8px; background: var(--bg2); padding: 2px 6px; border-radius: 3px; color: var(--text3); }
.dvp-badge { font-family: var(--mono); font-size: 9px; padding: 4px 8px; border-radius: 4px; margin-left: auto; }
.dvp-soft { background: var(--green-bg); color: var(--green); }
.dvp-tough { background: rgba(255,77,106,0.1); color: var(--red); }

.player-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.player-row.value { border-color: var(--green); background: var(--green-bg); }
.player-name { font-weight: 500; min-width: 150px; }
.value-badge { font-family: var(--mono); font-size: 8px; background: var(--green); color: var(--bg); padding: 2px 6px; border-radius: 3px; margin-left: 8px; }

.player-stats { display: flex; gap: 20px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-lbl { font-family: var(--mono); font-size: 8px; color: var(--text3); display: block; }
.stat-val { font-family: var(--mono); font-size: 13px; }
.stat-val.above { color: var(--green); }
.stat-val.below { color: var(--red); }

.hit-bar { width: 50px; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 6px; }
.hit-fill { height: 100%; background: var(--green); }
.hit-fill.med { background: var(--gold); }
.hit-fill.low { background: var(--red); }

.prop-box { text-align: right; min-width: 120px; }
.prop-line { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.prop-odds { font-family: var(--mono); font-size: 12px; color: var(--gold); margin-top: 2px; }
.add-btn { margin-top: 6px; font-size: 9px; padding: 5px 10px; }
.add-btn.added { background: var(--green); border-color: var(--green); color: var(--bg); }

.loading { text-align: center; padding: 60px; color: var(--text3); }
.spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.debug { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 20px; font-family: var(--mono); font-size: 10px; color: var(--text3); max-height: 200px; overflow-y: auto; display: none; }

.parlay-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg1); border-top: 1px solid var(--border); padding: 12px 20px; display: none; }
.parlay-bar.active { display: flex; justify-content: space-between; align-items: center; }
.parlay-info { font-family: var(--mono); font-size: 12px; }
.parlay-odds { color: var(--gold); font-size: 16px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏀 NBA PARLAY FINDER v2</div>
  <div class="controls">
    <input type="text" class="input" id="odds-key" placeholder="Odds API key (optional)" />
    <div class="toggle-group" id="sample-toggle">
      <button class="toggle-btn" data-val="5">L5</button>
      <button class="toggle-btn active" data-val="10">L10</button>
    </div>
    <div class="toggle-group" id="prop-toggle">
      <button class="toggle-btn active" data-val="points">PTS</button>
      <button class="toggle-btn" data-val="rebounds">REB</button>
      <button class="toggle-btn" data-val="assists">AST</button>
    </div>
    <button class="btn btn-primary" onclick="loadData()">Load Games</button>
    <button class="btn" onclick="toggleDebug()">Debug</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar" style="display:none;">
  <div class="stat-card"><div class="stat-label">GAMES</div><div class="stat-value" id="s-games">0</div></div>
  <div class="stat-card"><div class="stat-label">PLAYERS</div><div class="stat-value" id="s-players">0</div></div>
  <div class="stat-card"><div class="stat-label">VALUE PICKS</div><div class="stat-value green" id="s-value">0</div></div>
</div>

<div id="content">
  <div class="loading">
    <p>Click "Load Games" to start</p>
    <p style="margin-top:8px;font-size:11px;">Odds API key is optional - stats will still load without it</p>
  </div>
</div>

<div class="debug" id="debug"></div>

<div class="parlay-bar" id="parlay-bar">
  <div class="parlay-info"><span id="parlay-count">0</span> legs selected</div>
  <div class="parlay-odds" id="parlay-odds">+0</div>
  <button class="btn" onclick="clearParlay()">Clear</button>
</div>

<script>
// State
let state = {
  games: [],
  players: [],
  parlay: [],
  sampleSize: 10,
  propType: 'points'
};

// Debug logger
function log(msg) {
  console.log(msg);
  const d = document.getElementById('debug');
  d.innerHTML += msg + '<br>';
  d.scrollTop = d.scrollHeight;
}

function toggleDebug() {
  const d = document.getElementById('debug');
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
}

// Setup toggles
document.querySelectorAll('.toggle-group').forEach(group => {
  group.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.onclick = () => {
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (group.id === 'sample-toggle') state.sampleSize = parseInt(btn.dataset.val);
      if (group.id === 'prop-toggle') state.propType = btn.dataset.val;
      if (state.players.length > 0) render();
    };
  });
});

// Load saved key
document.getElementById('odds-key').value = localStorage.getItem('oddsKey') || '';

// Main load function
async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading games...</div>';
  document.getElementById('debug').innerHTML = '';
  
  try {
    // Step 1: Get today's games
    const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
    log('Fetching today: ' + today);
    
    const gamesRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=${today}`);
    const gamesData = await gamesRes.json();
    
    state.games = (gamesData.events || []).map(e => {
      const comp = e.competitions[0];
      const home = comp.competitors.find(c => c.homeAway === 'home');
      const away = comp.competitors.find(c => c.homeAway === 'away');
      return {
        id: e.id,
        name: e.name,
        date: e.date,
        homeId: home.team.id,
        homeName: home.team.displayName,
        homeAbbr: home.team.abbreviation,
        awayId: away.team.id,
        awayName: away.team.displayName,
        awayAbbr: away.team.abbreviation
      };
    });
    
    log(`Found ${state.games.length} games today`);
    
    if (state.games.length === 0) {
      content.innerHTML = '<div class="loading">No games today</div>';
      return;
    }
    
    // Step 2: Get recent completed games for player stats
    content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading recent box scores...</div>';
    
    const playerMap = {};
    let gamesLoaded = 0;
    
    // Check last 10 days for completed games
    for (let daysAgo = 1; daysAgo <= 10 && gamesLoaded < 25; daysAgo++) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      const dateStr = d.toISOString().split('T')[0].replace(/-/g, '');
      
      try {
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=${dateStr}`);
        const data = await res.json();
        
        for (const event of (data.events || [])) {
          if (event.status?.type?.name !== 'STATUS_FINAL') continue;
          if (gamesLoaded >= 25) break;
          
          try {
            const boxRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${event.id}`);
            const boxData = await boxRes.json();
            
            const header = boxData.header?.competitions?.[0];
            const homeTeamId = header?.competitors?.find(c => c.homeAway === 'home')?.id;
            
            for (const teamBox of (boxData.boxscore?.players || [])) {
              const teamId = teamBox.team?.id;
              const teamAbbr = teamBox.team?.abbreviation || '?';
              const isHome = teamId === homeTeamId;
              
              const stats = teamBox.statistics?.[0];
              if (!stats?.athletes) continue;
              
              // Keys: minutes, points, fg, 3pt, ft, rebounds, assists, turnovers, steals, blocks...
              for (const a of stats.athletes) {
                const athlete = a.athlete;
                const s = a.stats || [];
                if (!athlete?.id || s.length < 7) continue;
                
                const minutes = parseInt(s[0]) || 0;
                if (minutes < 10) continue;
                
                const points = parseInt(s[1]) || 0;
                const rebounds = parseInt(s[5]) || 0;
                const assists = parseInt(s[6]) || 0;
                
                let threes = 0;
                if (s[3] && s[3].includes('-')) {
                  threes = parseInt(s[3].split('-')[0]) || 0;
                }
                
                if (!playerMap[athlete.id]) {
                  playerMap[athlete.id] = {
                    id: athlete.id,
                    name: athlete.displayName,
                    team: teamAbbr,
                    teamId: teamId,
                    games: []
                  };
                }
                
                playerMap[athlete.id].games.push({ points, rebounds, assists, threes, minutes, isHome });
              }
            }
            
            gamesLoaded++;
            log(`Loaded box score ${gamesLoaded}/25`);
            
          } catch (e) {
            log(`Box score error: ${e.message}`);
          }
        }
      } catch (e) {
        log(`Date error: ${e.message}`);
      }
    }
    
    log(`Total players found: ${Object.keys(playerMap).length}`);
    
    // Step 3: Match players to today's games
    state.players = [];
    
    for (const game of state.games) {
      for (const p of Object.values(playerMap)) {
        if (p.games.length < 3) continue;
        
        const isHome = p.teamId == game.homeId;
        const isAway = p.teamId == game.awayId;
        if (!isHome && !isAway) continue;
        
        const avg = (arr, key) => arr.reduce((s, g) => s + g[key], 0) / arr.length;
        const l5 = p.games.slice(0, 5);
        const l10 = p.games.slice(0, 10);
        const homeGames = p.games.filter(g => g.isHome);
        const awayGames = p.games.filter(g => !g.isHome);
        
        state.players.push({
          id: p.id,
          name: p.name,
          team: p.team,
          teamId: p.teamId,
          gameId: game.id,
          isHome: isHome,
          opponent: isHome ? game.awayAbbr : game.homeAbbr,
          oppId: isHome ? game.awayId : game.homeId,
          gameLogs: p.games,
          l5: { points: avg(l5, 'points'), rebounds: avg(l5, 'rebounds'), assists: avg(l5, 'assists'), minutes: avg(l5, 'minutes') },
          l10: { points: avg(l10, 'points'), rebounds: avg(l10, 'rebounds'), assists: avg(l10, 'assists'), minutes: avg(l10, 'minutes') },
          homeSplit: homeGames.length >= 2 ? { points: avg(homeGames, 'points'), rebounds: avg(homeGames, 'rebounds'), assists: avg(homeGames, 'assists') } : null,
          awaySplit: awayGames.length >= 2 ? { points: avg(awayGames, 'points'), rebounds: avg(awayGames, 'rebounds'), assists: avg(awayGames, 'assists') } : null,
          prop: null
        });
      }
    }
    
    log(`Players for today's games: ${state.players.length}`);
    
    // Step 4: Load props if we have an API key
    const oddsKey = document.getElementById('odds-key').value.trim();
    if (oddsKey) {
      localStorage.setItem('oddsKey', oddsKey);
      content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading prop lines...</div>';
      
      try {
        const propRes = await fetch(`https://api.the-odds-api.com/v4/sports/basketball_nba/odds/?apiKey=${oddsKey}&regions=us&markets=player_points,player_rebounds,player_assists&oddsFormat=american`);
        const propData = await propRes.json();
        
        if (Array.isArray(propData)) {
          const propMap = {};
          
          for (const event of propData) {
            for (const book of (event.bookmakers || [])) {
              for (const market of (book.markets || [])) {
                const propType = market.key.replace('player_', '');
                for (const outcome of (market.outcomes || [])) {
                  const key = `${outcome.description}_${propType}`;
                  if (!propMap[key] || book.key === 'fanduel') {
                    propMap[key] = { line: outcome.point, odds: outcome.price };
                  }
                }
              }
            }
          }
          
          log(`Props loaded: ${Object.keys(propMap).length}`);
          
          for (const p of state.players) {
            const key = `${p.name}_${state.propType}`;
            if (propMap[key]) {
              p.prop = propMap[key];
            }
          }
        }
      } catch (e) {
        log(`Props error: ${e.message}`);
      }
    }
    
    // Done
    document.getElementById('stats-bar').style.display = 'grid';
    render();
    
  } catch (err) {
    log(`Error: ${err.message}`);
    content.innerHTML = `<div class="loading">Error: ${err.message}</div>`;
  }
}

function render() {
  const content = document.getElementById('content');
  const prop = state.propType;
  const sample = state.sampleSize === 5 ? 'l5' : 'l10';
  
  // Update stats
  document.getElementById('s-games').textContent = state.games.length;
  document.getElementById('s-players').textContent = state.players.length;
  
  let valueCount = 0;
  let html = '';
  
  for (const game of state.games) {
    const homePlayers = state.players.filter(p => p.gameId === game.id && p.isHome);
    const awayPlayers = state.players.filter(p => p.gameId === game.id && !p.isHome);
    
    // Sort by average stat descending
    const sort = (arr) => arr.sort((a, b) => (b[sample][prop] || 0) - (a[sample][prop] || 0)).slice(0, 8);
    
    html += `
      <div class="game-card">
        <div class="game-header">
          <div class="game-title">${game.awayName} @ ${game.homeName}</div>
          <div class="game-time">${new Date(game.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</div>
        </div>
        ${renderTeam(game.homeName, sort(homePlayers), true, prop, sample)}
        ${renderTeam(game.awayName, sort(awayPlayers), false, prop, sample)}
      </div>
    `;
    
    valueCount += [...homePlayers, ...awayPlayers].filter(p => isValue(p, prop, sample)).length;
  }
  
  document.getElementById('s-value').textContent = valueCount;
  content.innerHTML = html || '<div class="loading">No player data found</div>';
}

function renderTeam(name, players, isHome, prop, sample) {
  if (players.length === 0) return '';
  
  let html = `
    <div class="team-section">
      <div class="team-name">
        ${name}
        ${isHome ? '<span class="home-badge">HOME</span>' : ''}
      </div>
  `;
  
  for (const p of players) {
    const avg = p[sample][prop] || 0;
    const line = p.prop?.line;
    const odds = p.prop?.odds;
    const value = isValue(p, prop, sample);
    
    // Hit rate
    let hitRate = null;
    if (line !== null && line !== undefined) {
      const logs = p.gameLogs.slice(0, state.sampleSize);
      const hits = logs.filter(g => g[prop] > line).length;
      hitRate = { hits, total: logs.length, pct: Math.round((hits / logs.length) * 100) };
    }
    
    // Split
    const split = p.isHome ? p.homeSplit : p.awaySplit;
    const splitAvg = split ? split[prop] : null;
    const splitDiff = splitAvg ? (splitAvg - avg).toFixed(1) : null;
    
    html += `
      <div class="player-row ${value ? 'value' : ''}">
        <div class="player-name">
          ${p.name}
          ${value ? '<span class="value-badge">VALUE</span>' : ''}
        </div>
        <div class="player-stats">
          <div class="stat">
            <span class="stat-lbl">L${state.sampleSize} AVG</span>
            <span class="stat-val ${line !== undefined && avg > line ? 'above' : line !== undefined && avg < line ? 'below' : ''}">${avg.toFixed(1)}</span>
          </div>
          ${line !== undefined ? `
          <div class="stat">
            <span class="stat-lbl">LINE</span>
            <span class="stat-val">${line}</span>
          </div>
          <div class="stat">
            <span class="stat-lbl">HIT RATE</span>
            <span class="stat-val">
              <div class="hit-bar"><div class="hit-fill ${hitRate.pct >= 70 ? '' : hitRate.pct >= 50 ? 'med' : 'low'}" style="width:${hitRate.pct}%"></div></div>
              ${hitRate.hits}/${hitRate.total}
            </span>
          </div>
          ` : `
          <div class="stat">
            <span class="stat-lbl">LINE</span>
            <span class="stat-val" style="color:var(--text3)">--</span>
          </div>
          `}
          ${splitDiff ? `
          <div class="stat">
            <span class="stat-lbl">${p.isHome ? 'HOME' : 'AWAY'}</span>
            <span class="stat-val ${parseFloat(splitDiff) > 0 ? 'above' : parseFloat(splitDiff) < 0 ? 'below' : ''}">${parseFloat(splitDiff) > 0 ? '+' : ''}${splitDiff}</span>
          </div>
          ` : ''}
          <div class="stat">
            <span class="stat-lbl">MIN</span>
            <span class="stat-val">${p[sample].minutes.toFixed(0)}</span>
          </div>
        </div>
        <div class="prop-box">
          ${line !== undefined ? `
            <div class="prop-line">O ${line} ${prop.toUpperCase()}</div>
            <div class="prop-odds">${odds > 0 ? '+' : ''}${odds}</div>
            <button class="add-btn btn ${state.parlay.some(l => l.id === p.id) ? 'added' : ''}" onclick="toggleParlay('${p.id}', '${p.name}', ${line}, ${odds})">
              ${state.parlay.some(l => l.id === p.id) ? '✓' : '+'}
            </button>
          ` : '<div class="prop-line" style="color:var(--text3)">No line</div>'}
        </div>
      </div>
    `;
  }
  
  html += '</div>';
  return html;
}

function isValue(p, prop, sample) {
  const avg = p[sample][prop] || 0;
  const line = p.prop?.line;
  const odds = p.prop?.odds;
  if (line === undefined || line === null) return false;
  return avg > line && odds >= -400;
}

function toggleParlay(id, name, line, odds) {
  const idx = state.parlay.findIndex(l => l.id === id);
  if (idx >= 0) {
    state.parlay.splice(idx, 1);
  } else {
    state.parlay.push({ id, name, line, odds });
  }
  updateParlayBar();
  render();
}

function clearParlay() {
  state.parlay = [];
  updateParlayBar();
  render();
}

function updateParlayBar() {
  const bar = document.getElementById('parlay-bar');
  if (state.parlay.length === 0) {
    bar.classList.remove('active');
    return;
  }
  bar.classList.add('active');
  document.getElementById('parlay-count').textContent = state.parlay.length;
  
  let mult = 1;
  for (const leg of state.parlay) {
    mult *= leg.odds > 0 ? (leg.odds / 100) + 1 : (100 / Math.abs(leg.odds)) + 1;
  }
  const american = mult >= 2 ? Math.round((mult - 1) * 100) : Math.round(-100 / (mult - 1));
  document.getElementById('parlay-odds').textContent = (american > 0 ? '+' : '') + american;
}
</script>
</body>
