<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crypto Intel · Intel Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07080d; --bg1:#0d1018; --bg2:#111520;
  --border:#1e2535; --border2:#2a3848;
  --text:#d0d8f0; --text2:#8a9abb; --text3:#4a5a7a;
  --green:#3ddc84; --red:#ff5566; --gold:#ffc947; --blue:#4ab8ff; --purple:#b87aff; --teal:#3dffd4;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
.sidebar{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main{overflow-y:auto;padding:16px;}

/* ── SIDEBAR ── */
.sb-logo-wrap{padding:16px;border-bottom:1px solid var(--border);}
.sb-logo{font-family:var(--mono);font-size:13px;color:var(--blue);letter-spacing:3px;font-weight:500;}
.sb-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:3px;}
.sb-sec{padding:12px 14px;border-bottom:1px solid var(--border);}
.sb-sec-title{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:8px;}

.key-row{display:flex;flex-direction:column;gap:3px;margin-bottom:6px;}
.key-lbl{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:1px;}
.key-inp{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--blue);font-family:var(--mono);font-size:10px;padding:5px 8px;border-radius:4px;outline:none;}
.key-inp:focus{border-color:var(--blue);}
.sb-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:10px;padding:6px;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all 0.15s;margin-top:4px;}
.sb-btn:hover{border-color:var(--blue);color:var(--blue);}
.key-status{font-family:var(--mono);font-size:9px;margin-top:5px;letter-spacing:1px;}
.ks-set{color:var(--green);} .ks-none{color:var(--text3);}

/* SIGNAL SUMMARY */
.sig-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px;}
.sig-item{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px;text-align:center;}
.sig-val{font-family:var(--mono);font-size:18px;font-weight:500;}
.sig-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;margin-top:2px;}
.sv-buy{color:var(--green);} .sv-hold{color:var(--gold);} .sv-sell{color:var(--red);}

/* WATCHLIST */
.wl-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.wl-item:last-child{border:none;}
.wl-item:hover .wl-sym{color:var(--blue);}
.wl-left{display:flex;flex-direction:column;gap:2px;}
.wl-sym{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500;transition:color 0.15s;}
.wl-name{font-family:var(--mono);font-size:9px;color:var(--text3);}
.wl-right{display:flex;align-items:center;gap:6px;}
.wl-price{font-family:var(--mono);font-size:10px;color:var(--text2);}
.wl-chg{font-family:var(--mono);font-size:10px;}
.wl-chg.up{color:var(--green);} .wl-chg.down{color:var(--red);}
.wl-verdict{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;letter-spacing:1px;}
.vb-buy{background:rgba(61,220,132,0.1);border:1px solid rgba(61,220,132,0.3);color:var(--green);}
.vb-sell{background:rgba(255,85,102,0.1);border:1px solid rgba(255,85,102,0.3);color:var(--red);}
.vb-hold{background:rgba(255,201,71,0.1);border:1px solid rgba(255,201,71,0.3);color:var(--gold);}
.wl-rm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px;transition:color 0.1s;}
.wl-rm:hover{color:var(--red);}

.add-row{display:flex;gap:6px;margin-top:8px;}
.add-inp{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 8px;border-radius:4px;outline:none;letter-spacing:1px;}
.add-inp:focus{border-color:var(--blue);}
.add-inp::placeholder{letter-spacing:0;color:var(--text3);font-size:10px;}
.add-btn-sm{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.add-btn-sm:hover{border-color:var(--blue);color:var(--blue);}

/* PRESETS */
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;}
.preset-btn{background:transparent;border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:9px;padding:5px;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all 0.15s;text-align:center;}
.preset-btn:hover{border-color:var(--blue);color:var(--blue);}

/* ── MAIN ── */
.main-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.ctrl-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:5px;cursor:pointer;letter-spacing:1px;transition:all 0.15s;white-space:nowrap;}
.ctrl-btn:hover{border-color:var(--blue);color:var(--blue);}
.ctrl-btn:disabled{opacity:0.3;cursor:not-allowed;}
.ctrl-btn.primary{border-color:#1a4a6a;color:var(--blue);}
.ctrl-btn.primary:hover{background:rgba(74,184,255,0.05);}

/* FILTERS */
.filter-bar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.fl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;}
.fb{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;letter-spacing:1px;transition:all 0.15s;}
.fb:hover{border-color:var(--border2);color:var(--text2);}
.fb.act{border-color:var(--blue);color:var(--blue);background:rgba(74,184,255,0.05);}
.fb.act-g{border-color:var(--green);color:var(--green);}
.fb.act-r{border-color:var(--red);color:var(--red);}
.fb.act-gold{border-color:var(--gold);color:var(--gold);}
.fsep{width:1px;height:14px;background:var(--border);margin:0 2px;}

.status-bar{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:12px;letter-spacing:1px;min-height:14px;}
.status-bar.ld{color:var(--blue);animation:blink 1s infinite;}
.status-bar.ok{color:var(--green);}
.status-bar.er{color:var(--red);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}

/* ── DORMANT CARD ── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.2s;}
.card.dormant{cursor:pointer;min-height:88px;display:flex;align-items:stretch;}
.card.dormant:hover{border-color:var(--blue);background:var(--bg2);}
.card.dormant:hover .dhint{opacity:1;}
.card.dormant.prev-up{border-left:2px solid var(--green);}
.card.dormant.prev-down{border-left:2px solid var(--red);}
.dorm-body{display:flex;align-items:center;justify-content:space-between;padding:14px;flex:1;}
.dorm-left{display:flex;flex-direction:column;gap:3px;}
.dsym{font-family:var(--mono);font-size:18px;color:var(--text);font-weight:500;letter-spacing:2px;}
.dname{font-size:12px;color:var(--text2);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.dtag{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:2px;letter-spacing:1px;border:1px solid;}
.dhint{font-family:var(--mono);font-size:9px;color:var(--blue);letter-spacing:2px;opacity:0;transition:opacity 0.2s;margin-top:3px;}
.dorm-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.dprev{font-family:var(--mono);font-size:9px;}
.dprev.up{color:var(--green);} .dprev.down{color:var(--red);}
.scan-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);animation:pulse 2s infinite;}
.rm-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;transition:color 0.15s;}
.rm-btn:hover{color:var(--red);}

/* ── LOADED CARD ── */
.card.loaded{cursor:default;}
.card-scan{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0;}
.card.scanning .card-scan{animation:scandown 1.5s ease-out;}
@keyframes scandown{0%{top:0;opacity:0.8}100%{top:100%;opacity:0}}

.card-top{padding:12px 14px 8px;position:relative;}
.card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.coin-sym{font-family:var(--mono);font-size:16px;color:var(--text);font-weight:500;letter-spacing:2px;}
.coin-name{font-size:11px;color:var(--text2);margin-top:2px;}
.card-actions{display:flex;gap:4px;}
.icon-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;transition:color 0.15s;}
.icon-btn:hover{color:var(--blue);}
.icon-btn.rm:hover{color:var(--red);}

.badge-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:2px;letter-spacing:1px;border:1px solid;}

/* PRICE */
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
.price{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);}
.chg{font-family:var(--mono);font-size:12px;}
.chg.up{color:var(--green);} .chg.down{color:var(--red);} .chg.flat{color:var(--text3);}

/* SPARKLINE */
.spark-wrap{margin-bottom:10px;}
.spark-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;}
canvas.spark{width:100%;height:48px;display:block;}

/* ATH BAR */
.bar-wrap{margin-bottom:8px;}
.bar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:var(--text3);margin-bottom:3px;}
.bar-track{height:4px;background:var(--bg);border-radius:2px;position:relative;}
.bar-fill{height:100%;border-radius:2px;}
.bar-dot{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;transform:translateX(-50%);}

/* META GRID */
.meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.meta-cell{background:var(--bg);border-radius:4px;padding:6px 8px;}
.meta-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:2px;}
.meta-val{font-family:var(--mono);font-size:11px;color:var(--text2);}
.meta-val.hot{color:var(--gold);}
.meta-val.up{color:var(--green);}
.meta-val.down{color:var(--red);}

/* RETURNS */
.ret-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.ret-item{display:flex;flex-direction:column;gap:2px;}
.ret-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;}
.ret-val{font-family:var(--mono);font-size:11px;}

/* SENTIMENT BAR */
.sent-wrap{margin-bottom:8px;}
.sent-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:4px;display:flex;justify-content:space-between;}
.sent-track{height:5px;background:rgba(255,85,102,0.3);border-radius:3px;position:relative;overflow:hidden;}
.sent-fill{height:100%;background:rgba(61,220,132,0.6);border-radius:3px;}

.divider{border:none;border-top:1px solid var(--border);margin:8px 0;}

/* NEWS */
.news-item{font-size:11px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);line-height:1.4;cursor:pointer;transition:color 0.15s;}
.news-item:last-child{border:none;}
.news-item:hover{color:var(--text);}
.news-src{font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:1px;}

/* VERDICT */
.verdict{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:5px;margin:8px 14px 12px;}
.verdict.buy{background:rgba(61,220,132,0.07);border:1px solid rgba(61,220,132,0.25);}
.verdict.sell{background:rgba(255,85,102,0.07);border:1px solid rgba(255,85,102,0.25);}
.verdict.hold{background:rgba(255,201,71,0.07);border:1px solid rgba(255,201,71,0.25);}
.verdict.pending{background:var(--bg);border:1px solid var(--border);}
.v-badge{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:2px;min-width:40px;}
.verdict.buy .v-badge{color:var(--green);}
.verdict.sell .v-badge{color:var(--red);}
.verdict.hold .v-badge{color:var(--gold);}
.verdict.pending .v-badge{color:var(--text3);animation:blink 1s infinite;}
.v-text{font-size:12px;line-height:1.4;}
.verdict.buy .v-text{color:#7ae8aa;}
.verdict.sell .v-text{color:#ff8899;}
.verdict.hold .v-text{color:#ffd97a;}
.verdict.pending .v-text{color:var(--text3);}

/* HISTORY */
.hist-row{font-family:var(--mono);font-size:9px;display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text3);}
.hist-row:last-child{border:none;}
.hv-buy{color:var(--green);} .hv-sell{color:var(--red);} .hv-hold{color:var(--gold);}

.loading-card{display:flex;align-items:center;justify-content:center;min-height:80px;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px;animation:blink 1s infinite;}
.error-card{font-family:var(--mono);font-size:10px;color:var(--red);padding:12px 14px;}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;font-family:var(--mono);font-size:12px;color:var(--text3);letter-spacing:2px;}
.ts{font-family:var(--mono);font-size:8px;color:var(--text3);padding:0 14px 10px;}

@media(max-width:700px){.shell{grid-template-columns:1fr;}.sidebar{position:static;height:auto;}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="shell">

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sb-logo-wrap">
    <div class="sb-logo">◈ CRYPTO INTEL</div>
    <div class="sb-sub">INTEL SUITE // MARKET TRACKER</div>
  </div>

  <!-- API KEY -->
  <div class="sb-sec">
    <div class="sb-sec-title">ANTHROPIC API KEY</div>
    <div class="key-row">
      <input class="key-inp" id="akey-inp" placeholder="sk-ant-..." type="password"/>
    </div>
    <button class="sb-btn" onclick="saveAKey()">SAVE KEY</button>
    <div class="key-status" id="akey-status">● NOT SET</div>
  </div>

  <!-- SIGNAL SUMMARY -->
  <div class="sb-sec">
    <div class="sb-sec-title">AI SIGNALS</div>
    <div class="sig-grid">
      <div class="sig-item"><div class="sig-val sv-buy" id="sum-buy">0</div><div class="sig-lbl">BUY</div></div>
      <div class="sig-item"><div class="sig-val sv-hold" id="sum-hold">0</div><div class="sig-lbl">HOLD</div></div>
      <div class="sig-item"><div class="sig-val sv-sell" id="sum-sell">0</div><div class="sig-lbl">SELL</div></div>
    </div>
  </div>

  <!-- WATCHLIST -->
  <div class="sb-sec" style="flex:1;overflow-y:auto;">
    <div class="sb-sec-title">WATCHLIST</div>
    <div id="wl-list"></div>
    <div class="add-row">
      <input class="add-inp" id="coin-inp" placeholder="coin id (e.g. solana)"/>
      <button class="add-btn-sm" onclick="addCoin()">+ ADD</button>
    </div>
  </div>

  <!-- PRESETS -->
  <div class="sb-sec">
    <div class="sb-sec-title">PRESETS</div>
    <div class="preset-grid">
      <button class="preset-btn" onclick="loadPreset('large')">LARGE CAP</button>
      <button class="preset-btn" onclick="loadPreset('defi')">DEFI</button>
      <button class="preset-btn" onclick="loadPreset('layer1')">LAYER 1</button>
      <button class="preset-btn" onclick="loadPreset('meme')">MEME</button>
      <button class="preset-btn" onclick="loadPreset('emerging')">EMERGING</button>
      <button class="preset-btn" onclick="loadPreset('all')">ALL DEFAULT</button>
    </div>
  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main">
  <div class="main-hdr">
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="ctrl-btn primary" onclick="loadAll()" id="load-btn">◈ LOAD ALL</button>
      <button class="ctrl-btn" onclick="analyzeAll()" id="analyze-btn">⚡ RUN ANALYSIS</button>
      <button class="ctrl-btn" onclick="clearLoaded()">↺ RESET</button>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text3);" id="last-updated">--</div>
  </div>

  <div class="filter-bar">
    <span class="fl">SORT:</span>
    <button class="fb act" id="s-def"     onclick="setSort('default')">DEFAULT</button>
    <button class="fb"     id="s-chg"     onclick="setSort('chg')">24H %</button>
    <button class="fb"     id="s-mcap"    onclick="setSort('mcap')">MCAP</button>
    <button class="fb"     id="s-verdict" onclick="setSort('verdict')">SIGNAL</button>
    <div class="fsep"></div>
    <span class="fl">FILTER:</span>
    <button class="fb act" id="f-all"    onclick="setFilter('all')">ALL</button>
    <button class="fb"     id="f-buy"    onclick="setFilter('buy')">BUY</button>
    <button class="fb"     id="f-hold"   onclick="setFilter('hold')">HOLD</button>
    <button class="fb"     id="f-sell"   onclick="setFilter('sell')">SELL</button>
    <button class="fb"     id="f-loaded" onclick="setFilter('loaded')">LOADED</button>
  </div>

  <div class="status-bar" id="status">CLICK ◈ LOAD ALL OR INDIVIDUAL CARDS TO FETCH DATA</div>
  <div class="grid" id="grid"></div>
</main>
</div>

<script>
// ═══════════════════════════════════
// METADATA
// ═══════════════════════════════════
const DEFAULT_COINS = ['bitcoin','ethereum','solana','binancecoin','ripple','cardano','chainlink','uniswap','pepe','dogecoin'];

const COIN_META = {
  bitcoin:       {symbol:'BTC',name:'Bitcoin',       sector:'Large Cap',  tier:'L1'},
  ethereum:      {symbol:'ETH',name:'Ethereum',      sector:'Large Cap',  tier:'L1'},
  solana:        {symbol:'SOL',name:'Solana',         sector:'Layer 1',    tier:'L1'},
  binancecoin:   {symbol:'BNB',name:'BNB',            sector:'Large Cap',  tier:'L1'},
  ripple:        {symbol:'XRP',name:'XRP',            sector:'Large Cap',  tier:'L1'},
  cardano:       {symbol:'ADA',name:'Cardano',        sector:'Layer 1',    tier:'L1'},
  avalanche:     {symbol:'AVAX',name:'Avalanche',     sector:'Layer 1',    tier:'L1'},
  chainlink:     {symbol:'LINK',name:'Chainlink',     sector:'DeFi',       tier:'Oracle'},
  uniswap:       {symbol:'UNI',name:'Uniswap',        sector:'DeFi',       tier:'DEX'},
  aave:          {symbol:'AAVE',name:'Aave',          sector:'DeFi',       tier:'Lending'},
  maker:         {symbol:'MKR',name:'Maker',          sector:'DeFi',       tier:'Stablecoin'},
  pepe:          {symbol:'PEPE',name:'Pepe',          sector:'Meme',       tier:'Meme'},
  dogecoin:      {symbol:'DOGE',name:'Dogecoin',      sector:'Meme',       tier:'Meme'},
  'shiba-inu':   {symbol:'SHIB',name:'Shiba Inu',     sector:'Meme',       tier:'Meme'},
  sui:           {symbol:'SUI',name:'Sui',            sector:'Layer 1',    tier:'L1'},
  aptos:         {symbol:'APT',name:'Aptos',          sector:'Layer 1',    tier:'L1'},
  arbitrum:      {symbol:'ARB',name:'Arbitrum',       sector:'Layer 2',    tier:'L2'},
  optimism:      {symbol:'OP',name:'Optimism',        sector:'Layer 2',    tier:'L2'},
  'render-token':{symbol:'RENDER',name:'Render',      sector:'AI/DePIN',   tier:'Emerging'},
  'fetch-ai':    {symbol:'FET',name:'Fetch.ai',       sector:'AI/DePIN',   tier:'Emerging'},
  injective:     {symbol:'INJ',name:'Injective',      sector:'DeFi',       tier:'DEX'},
  celestia:      {symbol:'TIA',name:'Celestia',       sector:'Layer 1',    tier:'Modular'},
  worldcoin:     {symbol:'WLD',name:'Worldcoin',      sector:'AI/DePIN',   tier:'Emerging'},
};

const PRESETS = {
  large:   ['bitcoin','ethereum','solana','binancecoin','ripple'],

function ss(msg,type=''){const el=document.getElementById('status');el.textContent=msg;el.className='status-bar '+type;}
function ftime(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});}

function fmtPrice(p){
  if(!p) return '--';
  if(p>=1000) return '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)    return '$'+p.toFixed(4);
  if(p>=0.01) return '$'+p.toFixed(6);
  return '$'+p.toFixed(8);
}
function fmtMcap(m){
  if(!m)return'--';
  if(m>=1e12)return'$'+(m/1e12).toFixed(2)+'T';
  if(m>=1e9) return'$'+(m/1e9).toFixed(2)+'B';
  if(m>=1e6) return'$'+(m/1e6).toFixed(0)+'M';
  return'$'+m.toLocaleString();
}
function fmtVol(v){return fmtMcap(v);}
function fmtPct(n,decimals=2){return n!=null?(n>=0?'+':'')+n.toFixed(decimals)+'%':'--';}
function verdictClass(v){if(!v)return'hold';const l=v.toLowerCase();return l.includes('buy')?'buy':l.includes('sell')?'sell':'hold';}

function renderWatchlist(){
  const el=document.getElementById('wl-list');
  if(!watchlist.length){el.innerHTML='<div style="font-family:var(--mono);font-size:9px;color:var(--text3);padding:4px 0;">Empty</div>';return;}
  el.innerHTML=watchlist.map(id=>{
    const d=coinData[id],a=analyses[id],meta=getMeta(id);

function updateSummary(){

  document.getElementById('sum-buy').textContent=vals.filter(a=>a.verdict.toLowerCase().includes('buy')).length;
  document.getElementById('sum-hold').textContent=vals.filter(a=>a.verdict.toLowerCase().includes('hold')).length;

function setSort(s){
  curSort=s;
  ['def','chg','mcap','verdict'].forEach(k=>document.getElementById('s-'+k)?.classList.toggle('act',k===s));
  renderGrid();
}
function setFilter(f){
  curFilter=f;
  ['all','buy','hold','sell','loaded'].forEach(k=>document.getElementById('f-'+k)?.classList.toggle('act',k===f));
  renderGrid();
}
function getSorted(){
  let list=[...watchlist];
  if(curFilter==='loaded') list=list.filter(id=>coinData[id]);
  else if(curFilter==='buy')  list=list.filter(id=>analyses[id]?.verdict?.toLowerCase().includes('buy'));
  else if(curFilter==='sell') list=list.filter(id=>analyses[id]?.verdict?.toLowerCase().includes('sell'));
  else if(curFilter==='hold') list=list.filter(id=>analyses[id]?.verdict?.toLowerCase().includes('hold'));
  if(curSort==='chg')     list.sort((a,b)=>(coinData[b]?.price_change_percentage_24h||0)-(coinData[a]?.price_change_percentage_24h||0));
  else if(curSort==='mcap')    list.sort((a,b)=>(coinData[b]?.market_cap||0)-(coinData[a]?.market_cap||0));
  else if(curSort==='verdict'){
    const ord={buy:0,hold:1,sell:2};
    list.sort((a,b)=>(ord[verdictClass(analyses[a]?.verdict)]??1)-(ord[verdictClass(analyses[b]?.verdict)]??1));
  }
  return list;
}

async function fetchCoinGecko(coinId){
  try{
    const url=`https://api.coingecko.com/api/v3/coins/${coinId}?localization=false&tickers=false&market_data=true&community_data=true&developer_data=false&sparkline=true`;
    const r=await fetch(url,{signal:AbortSignal.timeout(14000)});
    if(!r.ok) return null;
    const d=await r.json();
    const md=d.market_data;
    if(!md) return null;
    return{
      id:d.id, symbol:d.symbol?.toUpperCase(), name:d.name,
      price:          md.current_price?.usd,
      change24h:      md.price_change_percentage_24h||0,
      change7d:       md.price_change_percentage_7d_in_currency?.usd||md.price_change_percentage_7d||0,
      change30d:      md.price_change_percentage_30d_in_currency?.usd||md.price_change_percentage_30d||0,
      price_change_percentage_24h: md.price_change_percentage_24h||0,
      high24h:        md.high_24h?.usd,
      low24h:         md.low_24h?.usd,
      market_cap:     md.market_cap?.usd,
      market_cap_rank:d.market_cap_rank,
      total_volume:   md.total_volume?.usd,
      ath:            md.ath?.usd,
      ath_change_pct: md.ath_change_percentage?.usd,
      circulating:    md.circulating_supply,
      max_supply:     md.max_supply,
      sparkline:      d.market_data?.sparkline_7d?.price||[],
      sentiment_up:   d.sentiment_votes_up_percentage,
      sentiment_down: d.sentiment_votes_down_percentage,
    };
  }catch(e){return null;}
}

async function fetchNews(coinId){
  const meta=getMeta(coinId);
  const q=encodeURIComponent(`${meta.symbol} ${meta.name} crypto`);
  try{
    const url=`https://news.google.com/rss/search?q=${q}&hl=en-US&gl=US&ceid=US:en`;
    const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    const outer=await r.json();
    if(!outer.contents) return[];
    const doc=new DOMParser().parseFromString(outer.contents,'text/xml');
    return[...doc.querySelectorAll('item')].slice(0,3).map(item=>({
      headline:item.querySelector('title')?.textContent?.replace(/ - .*$/,'')||'',
      url:item.querySelector('link')?.textContent||'#',
      date:item.querySelector('pubDate')?.textContent||'',
    })).filter(n=>n.headline.length>5);
  }catch(e){return[];}
}

// SPARKLINE
// ═══════════════════════════════════
function drawSpark(id,prices,isUp){
  const c=document.getElementById(id);
  if(!c||!prices||prices.length<2)return;
  const ctx=c.getContext('2d');
  const W=c.offsetWidth||260,H=48;
  c.width=W;c.height=H;
  const min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const pts=prices.map((p,i)=>({x:(i/(prices.length-1))*W,y:H-((p-min)/range)*(H-8)-4}));
  ctx.clearRect(0,0,W,H);
  // gradient fill
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,isUp?'rgba(61,220,132,0.15)':'rgba(255,85,102,0.15)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=isUp?'#3ddc84':'#ff5566';ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // current price dot
  const last=pts[pts.length-1];
  ctx.beginPath();ctx.arc(last.x,last.y,3,0,Math.PI*2);
  ctx.fillStyle=isUp?'#3ddc84':'#ff5566';ctx.fill();
}

// AI ANALYSIS
// ═══════════════════════════════════
async function analyzeStock(coinId){
  const d=coinData[coinId];if(!d)return;
  const meta=getMeta(coinId);
  const news=(d.news||[]).map(n=>n.headline).join(' | ');
  const supplyNote=d.max_supply?`Circ: ${(d.circulating/1e6).toFixed(1)}M / Max: ${(d.max_supply/1e6).toFixed(1)}M`:`Circ supply: ${d.circulating?(d.circulating/1e6).toFixed(1)+'M':'unlimited'}`;
  const sentNote=d.sentiment_up?`Sentiment: ${d.sentiment_up?.toFixed(0)}% bullish`:'';
  const volToMcap=d.market_cap>0?((d.total_volume/d.market_cap)*100).toFixed(1):'N/A';
  const prompt=`Crypto: ${d.symbol} (${d.name}) — ${meta.sector}, ${meta.tier}
Price: ${fmtPrice(d.price)} | 24h: ${fmtPct(d.change24h)} | 7d: ${fmtPct(d.change7d)} | 30d: ${fmtPct(d.change30d)}
24h High: ${fmtPrice(d.high24h)} | Low: ${fmtPrice(d.low24h)}
ATH: ${fmtPrice(d.ath)} (${d.ath_change_pct?.toFixed(1)}% from ATH)
MCap: ${fmtMcap(d.market_cap)} Rank #${d.market_cap_rank} | Vol: ${fmtVol(d.total_volume)} (${volToMcap}% of mcap)
${supplyNote} | ${sentNote}
News: ${news||'none'}`;
  try{
    if(!AKEY) throw new Error('no key');
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':AKEY,'anthropic-dangerous-direct-browser-access':'true','anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:150,
        system:`Crypto market analyst. Respond ONLY with JSON, no markdown:
{"verdict":"BUY"|"HOLD"|"SELL","reason":"one sharp sentence under 18 words"}`,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await resp.json();
    const text=(data.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    const s=text.indexOf('{'),e=text.lastIndexOf('}');
    analyses[coinId]=JSON.parse(s>=0&&e>=0?text.slice(s,e+1):text);
  }catch(ex){
    const p=d.change24h||0;
    const fv=p>3?'BUY':p<-3?'SELL':'HOLD';
    analyses[coinId]={verdict:fv,reason:p>3?`Up ${p.toFixed(1)}% — strong momentum.`:p<-3?`Down ${Math.abs(p).toFixed(1)}% — bearish pressure.`:'Consolidating — no clear edge.'};
  }
}

function logHistory(coinId){
  const a=analyses[coinId],d=coinData[coinId];if(!a||!d)return;
  if(!history[coinId])history[coinId]=[];
  history[coinId].unshift({time:ftime(),verdict:a.verdict,price:fmtPrice(d.price)});
  history[coinId]=history[coinId].slice(0,5);
  save();
}

  grid.innerHTML=list.map(id=>`<div class="card dormant" id="card-${id}"></div>`).join('');
  list.forEach(id=>coinData[id]?renderLoaded(id):renderDormant(id));
}

function renderDormant(coinId){
  const card=document.getElementById('card-'+coinId);if(!card)return;
  const meta=getMeta(coinId);
  const sc=SECTOR_COLORS[meta.sector]||'#4ab8ff';
  const hist=history[coinId];
  const lastD=hist?.length?hist[0]:null;
  const prevDir=lastD?verdictClass(lastD.verdict):'';
  card.className='card dormant'+(prevDir==='buy'?' prev-up':prevDir==='sell'?' prev-down':'');
  card.onclick=e=>{if(!e.target.classList.contains('rm-btn'))loadCard(coinId);};

    <div class="dorm-left">

    card.innerHTML=`<div class="error-card">DATA UNAVAILABLE — <span style="cursor:pointer;color:var(--blue);" onclick="reloadCard('${coinId}')">RETRY</span></div>`;

  // Volume heat

  const volHeat=vtm>20?'hot':vtm<3?'down':'';

    <div style="font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:5px;">INTEL FEED</div>

      <div class="card-hdr">
        <div>
          <div class="coin-sym">${meta.symbol}</div>

// LOAD FUNCTIONS
// ═══════════════════════════════════
async function loadCard(coinId){
  if(loading[coinId])return;
  loading[coinId]=true;
  const card=document.getElementById('card-'+coinId);
  if(card){card.className='card loaded';card.innerHTML=`<div class="loading-card">FETCHING ${getMeta(coinId).symbol}...</div>`;}
  ss('LOADING '+getMeta(coinId).symbol+'...','ld');
  const[quote,news]=await Promise.all([fetchCoinGecko(coinId),fetchNews(coinId)]);
  coinData[coinId]=quote?{...quote,news}:null;
  renderLoaded(coinId);
  if(coinData[coinId]){
    ss('RUNNING AI ANALYSIS...','ld');
    await analyzeStock(coinId);
    logHistory(coinId);
    renderLoaded(coinId);
    updateSummary();
    renderWatchlist();
    document.getElementById('last-updated').textContent=ftime();
    ss(getMeta(coinId).symbol+' LOADED @ '+ftime(),'ok');
  }else{ss(getMeta(coinId).symbol+' — DATA UNAVAILABLE','er');}
  loading[coinId]=false;
}

async function reloadCard(coinId){delete coinData[coinId];delete analyses[coinId];delete loading[coinId];await loadCard(coinId);}

async function loadAll(){
  const btn=document.getElementById('load-btn');btn.disabled=true;
  const dormant=watchlist.filter(id=>!coinData[id]&&!loading[id]);
  if(!dormant.length){ss('ALL LOADED');btn.disabled=false;return;}
  ss('LOADING '+dormant.length+' COINS...','ld');
  // Stagger to respect CoinGecko rate limits
  for(const id of dormant){
    await loadCard(id);
    await new Promise(r=>setTimeout(r,1200));
  }
  ss('ALL LOADED @ '+ftime(),'ok');btn.disabled=false;
}

async function analyzeAll(){
  const btn=document.getElementById('analyze-btn');btn.disabled=true;
  const loaded=watchlist.filter(id=>coinData[id]);
  ss('RUNNING ANALYSIS FOR '+loaded.length+' COINS...','ld');
  for(const id of loaded){await analyzeStock(id);logHistory(id);renderLoaded(id);}
  updateSummary();renderWatchlist();
  ss('ANALYSIS COMPLETE @ '+ftime(),'ok');btn.disabled=false;
}

function clearLoaded(){
  coinData={};analyses={};loading={};
  renderGrid();renderWatchlist();updateSummary();
  ss('RESET — STANDING BY');
  document.getElementById('last-updated').textContent='--';
}

function addCoin(){
  const inp=document.getElementById('coin-inp');
  const id=inp.value.trim().toLowerCase();
  if(!id||watchlist.includes(id)){inp.value='';return;}
  watchlist.push(id);save();inp.value='';
  renderGrid();renderWatchlist();
  ss('ADDED '+id+' — CLICK TO LOAD');
}

function removeCoin(coinId){
  watchlist=watchlist.filter(id=>id!==coinId);
  delete coinData[coinId];delete analyses[coinId];delete loading[coinId];
  save();renderGrid();renderWatchlist();updateSummary();
}

document.getElementById('coin-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addCoin();});
renderGrid();
</script>
</body>
</html>
